name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      BS_VERSION:
        description: Blessing Skin version
        required: true
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: blessing-skin
            context: ./blessing-skin
            dockerfile: ./blessing-skin/Dockerfile
            variant: blessing
            tag: ""
          - image: skin-http
            context: ./skin-http
            dockerfile: ./skin-http/Dockerfile
            variant: skin-http
            tag: ""
          - image: janus
            context: ./janus
            dockerfile: ./janus/Dockerfile
            variant: janus
            branch: mysql
            tag: mysql
          - image: janus
            context: ./janus
            dockerfile: ./janus/Dockerfile
            variant: janus
            branch: pgsql
            tag: pgsql
          - image: janus
            context: ./janus
            dockerfile: ./janus/Dockerfile
            variant: janus
            branch: sqlite
            tag: sqlite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_REF="${{ vars.REGISTRY }}/${{ vars.DOCKER_NAMESPACE }}/${{ matrix.image }}"
          if [ -n "${{ matrix.tag }}" ]; then
            IMAGE_REF="${IMAGE_REF}:${{ matrix.tag }}"
          fi

          BUILD_ARGS=()
          if [ "${{ matrix.variant }}" = "blessing" ]; then
            BUILD_ARGS+=(--build-arg "VERSION=${{ inputs.BS_VERSION }}")
          elif [ "${{ matrix.variant }}" = "janus" ]; then
            BUILD_ARGS+=(--build-arg "BRANCH=${{ matrix.branch }}")
          fi

          docker buildx build \
            --file "${{ matrix.dockerfile }}" \
            --tag "${IMAGE_REF}" \
            --push \
            "${BUILD_ARGS[@]}" \
            "${{ matrix.context }}"
